<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lighthouse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="chat-shell">
    <section class="chat-card" aria-label="Lighthouse Messages">
      <header class="chat-header">
        <div>
          <h1>Lighthouse</h1>
          <p id="userLabel" class="signed-in-text">Checking session...</p>
        </div>
        <button id="signOutBtn" class="small-btn" type="button">Sign Out</button>
      </header>

      <section class="profile-panel">
        <form id="profileForm" class="profile-form">
          <label for="displayNameInput">Display Name</label>
          <div class="profile-row">
            <input id="displayNameInput" type="text" maxlength="30" autocomplete="nickname" />
            <button type="submit">Save</button>
          </div>
        </form>

        <div class="online-panel">
          <span class="online-title">Online</span>
          <div id="onlineList" class="online-list">Loading...</div>
        </div>
      </section>

      <section id="adminPanel" class="admin-panel hidden">
        <div class="admin-head">
          <strong>Admin</strong>
          <span>Tools</span>
        </div>
        <div class="admin-grid">
          <button id="clearChatBtn" class="small-btn danger-btn" type="button">Clear Chat</button>
          <button id="createInviteBtn" class="small-btn" type="button">Create Access Code</button>
          <button id="exportChatBtn" class="small-btn" type="button">Export Chat</button>
        </div>
        <div id="inviteResult" class="invite-result"></div>
        <div id="memberList" class="member-list"></div>
      </section>

      <section id="messages" class="messages" aria-live="polite"></section>

      <form id="messageForm" class="message-form">
        <input id="messageInput" type="text" placeholder="Write a message..." autocomplete="off" maxlength="500" required />
        <button type="submit">Send</button>
      </form>
      <p id="chatStatus" class="status-message" role="status"></p>
    </section>
  </main>

  <script type="module" src="chat.js"></script>
</body>
</html>
