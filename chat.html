<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lighthouse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="chat-shell">
  <section class="chat-card" aria-label="Lighthouse Messages">

  <div class="chat-main">

    <header class="chat-header">
      <div>
        <div class="brand-row">
  <h1>Lighthouse</h1>
  <span class="app-version">v5.4.6</span>
</div>
        <p id="userLabel" class="signed-in-text">Checking session...</p>
      </div>
      <button id="accountBtn" class="small-btn" type="button">Account</button>
    </header>

    <!-- Room Selector -->
    <div class="room-dropdown-wrap">
  <select id="roomDropdown" class="room-dropdown">
</select>
</div>

    <section id="messages" class="messages" aria-live="polite"></section>

    <!-- Reply Preview -->
    <div id="replyPreview" class="reply-preview hidden">
      <div class="reply-preview-content">
        <strong id="replySender"></strong>
        <p id="replyText"></p>
      </div>
      <button id="cancelReplyBtn" type="button">✕</button>
    </div>

    <form id="messageForm" class="message-form">
      <input id="messageInput" type="text" placeholder="Write a message..." autocomplete="off" maxlength="500" />

      <input
        id="fileInput"
        type="file"
        hidden
        accept="image/png,image/jpeg,image/webp,.txt,.pdf,.doc,.docx,.xls,.xlsx,.csv"
      />

      <button id="attachBtn" type="button">📎</button>
      <button id="sendBtn" type="button">Send</button>
    </form>

    <p id="chatStatus" class="status-message" role="status"></p>

  </div>

    <!-- Account Modal -->
    <div id="accountModal" class="account-modal hidden">
      <div class="account-card">

        <div class="account-header">
          <h3>Account</h3>
          <button id="closeAccountBtn" type="button">✕</button>
        </div>

        <button id="signOutBtn" class="small-btn" type="button">Sign Out</button>

        <section class="profile-panel">
          <form id="profileForm" class="profile-form">
            <label for="displayNameInput">Display Name</label>
            <div class="profile-row">
              <input id="displayNameInput" type="text" maxlength="30" />
              <button type="submit">Save</button>
            </div>
          </form>

          <div class="online-panel">
            <span class="online-title">Online</span>
            <div id="onlineList" class="online-list">Loading...</div>
          </div>
        </section>

        <section id="adminPanel" class="admin-panel hidden">
          <div class="admin-head">
            <strong>Admin</strong>
            <span>Tools</span>
          </div>

          <div class="admin-grid">
            <button id="clearChatBtn" class="small-btn danger-btn" type="button">Clear Chat</button>
            <button id="createInviteBtn" class="small-btn" type="button">Create Access Code</button>
            <button id="exportChatBtn" class="small-btn" type="button">Export Chat</button>
            <button id="createRoomBtn" class="small-btn" type="button">Create Room</button>
          </div>

          <div id="inviteResult" class="invite-result"></div>
          <div id="memberList" class="member-list"></div>
          <div class="room-members-panel">
  <div class="member-title">Room Members</div>

  <div id="roomMemberManager"></div>
</div>
        </section>

      </div>
    </div>

    <div id="createRoomModal" class="modal hidden">
  <div class="modal-card">
    <h3 id="roomModalTitle">Create Room</h3>

    <input
      id="roomNameInput"
      class="modal-input"
      type="text"
      placeholder="Enter room name"
      maxlength="30"
    />

    <div class="modal-actions">
      <button id="cancelCreateRoomBtn" class="small-btn danger-btn" type="button">
        Cancel
      </button>
      <button id="confirmCreateRoomBtn" class="small-btn" type="button">
  Create
</button>
    </div>
  </div>
</div>

    <!-- Reaction Picker -->
    <div id="reactionPicker" class="reaction-picker hidden">
      <button type="button" class="reaction-option">👍</button>
      <button type="button" class="reaction-option">❤️</button>
      <button type="button" class="reaction-option">😂</button>
      <button type="button" class="reaction-option">😮</button>
      <button type="button" class="reaction-option">😢</button>
    </div>

  </section>
</main>

  <script type="module" src="chat.js"></script>

  <div id="imageModal" class="image-modal hidden">
  <div class="image-modal-toolbar">
    <a id="saveImageBtn" class="save-image-btn" download>Save</a>
    <button id="closeImageModal" class="image-modal-close">✕</button>
  </div>

  <img id="modalImage" class="image-modal-content" src="" alt="Preview">
</div>

  <div id="memberInfoModal" class="account-modal hidden">
  <div class="account-card">
    
    <div class="account-header">
      <h3>Account Info</h3>
      <button id="closeMemberInfoBtn" type="button">✕</button>
    </div>

    <div class="member-info-grid">
      <p><strong>Display Name:</strong> <span id="infoDisplayName">-</span></p>
      <p><strong>Email:</strong> <span id="infoEmail">-</span></p>
      <p><strong>Role:</strong> <span id="infoRole">-</span></p>
      <p><strong>Account Type:</strong> <span id="infoAccountType">-</span></p>
      <p><strong>Created Date:</strong> <span id="infoCreatedDate">-</span></p>
      <p><strong>Last Online:</strong> <span id="infoLastOnline">-</span></p>
      <p><strong>Status:</strong> <span id="infoStatus" class="status-badge">-</span></p>
    </div>

    <button id="toggleAccountBtn" class="small-btn danger-btn" type="button">
      Disable Account
    </button>

  </div>
</div>
</body>
</html>
