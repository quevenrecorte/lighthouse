<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lighthouse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page-shell">
    <section class="portal-card" aria-label="Lighthouse Login">
      <div class="brand-mark" aria-hidden="true">
        <span class="beam beam-one"></span>
        <span class="beam beam-two"></span>
        <span class="tower"></span>
      </div>

      <h1>Lighthouse</h1>

      <form id="loginForm" class="login-form">
        <label for="email">Username</label>
        <input id="email" name="email" type="text" placeholder="Enter username" autocomplete="username" required />

        <label for="password">Password</label>
        <div class="password-row">
          <input id="password" name="password" type="password" placeholder="Enter password" autocomplete="current-password" required />
          <button type="button" id="togglePassword" aria-label="Show password">Show</button>
        </div>

        <button class="signin-btn" type="submit">Sign In</button>
        <button class="plain-link" id="showSignupBtn" type="button">Create access</button>
        <p id="statusMessage" class="status-message" role="status"></p>
      </form>

      <form id="signupForm" class="login-form signup-form hidden">
        <label for="signupUsername">Username</label>
        <input id="signupUsername" type="text" placeholder="Choose username" autocomplete="username" />

        <label for="signupPassword">Password</label>
        <input id="signupPassword" type="password" placeholder="Create password" autocomplete="new-password" />

        <label for="inviteCode">Access Code</label>
        <input id="inviteCode" type="text" placeholder="Enter access code" autocomplete="off" />

        <button class="signin-btn" type="submit">Create Account</button>
        <button class="plain-link" id="showLoginBtn" type="button">Back to sign in</button>
        <p id="signupStatus" class="status-message" role="status"></p>
      </form>
    </section>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
